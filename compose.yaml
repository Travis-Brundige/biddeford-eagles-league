services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-biddeford}
      POSTGRES_USER: ${POSTGRES_USER:-biddeford}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-biddeford}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 3s
      timeout: 5s
      retries: 10

  web:
    build: .
    # Do not set `command:` here unless you intend to bypass the image ENTRYPOINT
    # (Python entrypoint runs migrate then gunicorn — required for DHI / no-shell images).
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-docker-only-change-me}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-biddeford}
      POSTGRES_USER: ${POSTGRES_USER:-biddeford}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-biddeford}
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
