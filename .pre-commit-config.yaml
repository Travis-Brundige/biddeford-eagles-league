#
# Mirrors .github/workflows/ci.yml — install once: `uv run pre-commit install`
# Run on demand: `uv run pre-commit run --all-files`
# Skip a hook (emergency only): `SKIP=pip-audit git commit ...`
default_install_hook_types: [pre-commit]
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
      - id: ruff-format

  - repo: local
    hooks:
      - id: bandit
        name: bandit
        language: system
        entry: uv
        args: [run, bandit, -r, ., -c, pyproject.toml]
        pass_filenames: false
        always_run: true

      - id: pip-audit
        name: pip-audit
        language: system
        entry: uv
        args: [run, pip-audit]
        pass_filenames: false
        always_run: true

      - id: django-check
        name: Django system check
        language: system
        entry: uv
        args: [run, python, manage.py, check]
        pass_filenames: false
        always_run: true

      - id: django-makemigrations-check
        name: Missing migrations check
        language: system
        entry: uv
        args: [run, python, manage.py, makemigrations, --check, --dry-run]
        pass_filenames: false
        always_run: true

      - id: pytest
        name: pytest
        language: system
        entry: uv
        args: [run, pytest]
        pass_filenames: false
        always_run: true
